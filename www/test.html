<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>触摸测试</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
h2{text-align:center}
.btn{display:block;width:100%;padding:18px;margin:10px 0;font-size:18px;
  border:2px solid #4f46e5;border-radius:14px;background:#fff;color:#4f46e5;
  cursor:pointer;text-align:center}
.btn:active{background:#eef2ff}
#log{background:#111;color:#0f0;padding:12px;border-radius:10px;margin:16px 0;font-family:monospace;font-size:13px;max-height:200px;overflow-y:auto}
</style>
</head>
<body>
<h2>📱 触摸测试</h2>
<div id="log">等待触摸...</div>
<button class="btn" onclick="tap('按钮A')">🔘 按钮 A</button>
<button class="btn" onclick="tap('按钮B')">🔘 按钮 B</button>
<button class="btn" onclick="tap('按钮C')">🔘 按钮 C</button>

<script>
var logs=[];
function tap(name){
  logs.push(new Date().toLocaleTimeString()+' ✅ '+name+' 被点击了!');
  document.getElementById('log').innerHTML=logs.slice(-10).join('<br>');
}
document.body.addEventListener('touchstart',function(){
  logs.push(new Date().toLocaleTimeString()+' 👆 触摸事件');
  document.getElementById('log').innerHTML=logs.slice(-10).join('<br>');
});
</script>
</body>
</html>
