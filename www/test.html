<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>触摸测试 v2</title>
<style>
body{font-family:sans-serif;padding:20px;background:#f5f5f5}
h2{text-align:center}
.btn{display:block;width:100%;padding:18px;margin:10px 0;font-size:18px;
  border:2px solid #4f46e5;border-radius:14px;background:#fff;color:#4f46e5;
  text-align:center}
.btn:active{background:#eef2ff}
#log{background:#111;color:#0f0;padding:12px;border-radius:10px;margin:16px 0;font-family:monospace;font-size:13px;max-height:200px;overflow-y:auto}
</style>
</head>
<body>
<h2>📱 触摸测试 v2</h2>
<div id="log">等待触摸...</div>
<button class="btn" id="btnA">🔘 按钮 A (click+touch)</button>
<button class="btn" id="btnB">🔘 按钮 B (click+touch)</button>
<button class="btn" id="btnC">🔘 按钮 C (click+touch)</button>

<script>
var logs=[];
function log(msg){
  logs.push(new Date().toLocaleTimeString()+' '+msg);
  document.getElementById('log').innerHTML=logs.slice(-12).join('<br>');
}

// Method 1: addEventListener click
document.getElementById('btnA').addEventListener('click',function(e){log('✅ A click事件');});
document.getElementById('btnB').addEventListener('click',function(e){log('✅ B click事件');});
document.getElementById('btnC').addEventListener('click',function(e){log('✅ C click事件');});

// Method 2: touchend on buttons
['btnA','btnB','btnC'].forEach(function(id){
  var el=document.getElementById(id);
  el.addEventListener('touchend',function(e){
    e.preventDefault();
    log('✅ '+id+' touchend事件触发!');
  });
  el.addEventListener('touchstart',function(e){
    log('👇 '+id+' touchstart');
  });
});

// Body touch
document.body.addEventListener('touchstart',function(){log('👆 身体触摸');});
</script>
</body>
</html>
