<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>下载刷题小程序</title>
<style>
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;margin:0;padding:20px;
  background:linear-gradient(135deg,#4f46e5,#6366f1);color:#fff;text-align:center;
}
.card{max-width:400px}
img{width:80px;height:80px;border-radius:18px;margin-bottom:16px}
h2{font-size:24px;margin:8px 0}
p{opacity:.85;font-size:14px;margin-bottom:24px;line-height:1.6}
.btn{display:inline-block;padding:16px 40px;background:#fff;color:#4f46e5;border-radius:30px;font-size:17px;font-weight:700;text-decoration:none;box-shadow:0 4px 20px rgba(0,0,0,.2)}
.spinner{margin:20px auto;width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="card">
  <img src="www/icons/icon-192.png" alt="">
  <h2 id="title">正在下载...</h2>
  <p id="msg">正在准备适合你设备的版本</p>
  <div class="spinner" id="spinner"></div>
  <a class="btn" id="manual" style="display:none" href="#">点此手动下载</a>
</div>
<script>
(function(){
  var ua = navigator.userAgent || '';
  var isAndroid = /android/i.test(ua);
  var isIOS = /iphone|ipad|ipod/i.test(ua);
  var isMobile = isAndroid || isIOS;
  var apk = 'https://github.com/k-7-6/quiz-app/releases/download/v1.0.1/quiz-app.apk';
  var pwa = 'https://k-7-6.github.io/quiz-app/www/app';
  var html = 'https://k-7-6.github.io/quiz-app/www/app';

  var title = document.getElementById('title');
  var msg = document.getElementById('msg');
  var spinner = document.getElementById('spinner');
  var manual = document.getElementById('manual');
  var downloadUrl = '';

  if (isAndroid) {
    // Redirect to PWA (works better than APK)
    downloadUrl = pwa;
    title.textContent = '正在打开刷题小程序';
    msg.textContent = '打开后点击顶部「安装」添加到桌面';
    setTimeout(function(){ window.location.href = downloadUrl; }, 600);
    spinner.style.display = 'none';
    return;
  } else if (isIOS) {
    downloadUrl = pwa;
    title.textContent = '正在打开刷题小程序';
    msg.textContent = '打开后点底部 ↑ 分享 → 添加到主屏幕';
    setTimeout(function(){ window.location.href = downloadUrl; }, 600);
    spinner.style.display = 'none';
    return;
  } else {
    downloadUrl = html;
    title.textContent = '正在打开刷题小程序';
    msg.textContent = '电脑端请直接用浏览器打开使用';
    setTimeout(function(){ window.location.href = downloadUrl; }, 600);
    spinner.style.display = 'none';
    return;
  }

  // Android: trigger download
  manual.href = downloadUrl;
  manual.textContent = '📦 点此手动下载 APK';

  // Method 1: iframe
  var iframe = document.createElement('iframe');
  iframe.style.display = 'none';
  iframe.src = downloadUrl;
  document.body.appendChild(iframe);

  // Method 2: direct link
  setTimeout(function(){
    window.location.href = downloadUrl;
  }, 500);

  // Show manual button after delay
  setTimeout(function(){
    spinner.style.display = 'none';
    manual.style.display = 'inline-block';
    msg.textContent = '如果下载没开始，请点击下方按钮';
  }, 4000);
})();
</script>
</body>
</html>
